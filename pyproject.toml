[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"backend/app/__init__.py" = ["F401"]
"backend/app/routers/__init__.py" = ["F401"]
"backend/app/services/__init__.py" = ["F401"]
"backend/app/schemas/__init__.py" = ["F401"]
"backend/app/services/akshare_fetcher.py" = ["F811"]

[tool.ruff.format]
quote-style = "double"
